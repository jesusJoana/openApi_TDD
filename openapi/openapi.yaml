openapi: 3.0.3
info:
  title: API de aprendizaje OpenAPI
  version: 1.0.0
  description: API de ejemplo para aprender OpenAPI con Node.js

paths:
  /:
    get:
      summary: Comprueba que la API está activa
      responses:
        '200':
          description: Respuesta correcta
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: API funcionando correctamente

  /movies:
    get:
      summary: Obtiene la lista de películas
      description: Devuelve un array con las películas disponibles
      responses:
        '200':
          description: Lista de películas
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      example: 1
                    title:
                      type: string
                      example: Inception
                    director:
                      type: string
                      example: Christopher Nolan

  /movies/{id}:
    get:
      summary: Obtiene una película por su identificador
      description: Devuelve una película concreta a partir de su id
      parameters:
        - name: id
          in: path
          required: true
          description: Identificador de la película
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Película encontrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1
                  title:
                    type: string
                    example: Inception
                  director:
                    type: string
                    example: Christopher Nolan
        '404':
          description: Película no encontrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Película no encontrada